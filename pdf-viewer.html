<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<title>Íbúaskrá</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #2b2b2b;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>

<body>

<iframe id="pdfFrame" title="Íbúaskrá PDF"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

document.getElementById("pdfFrame").src =
    file + "#toolbar=0&navpanes=0&scrollbar=1";
</script>

</body>
</html>
